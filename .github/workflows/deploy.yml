name: Deploy to VPS

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/websites/edit-with-me

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${VPS_HOST}"
          test -n "${VPS_USER}"
          test -n "${VPS_SSH_KEY}"
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Create .env on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          EWM_SECRET: ${{ secrets.EWM_SECRET }}
        run: |
          set -euo pipefail
          test -n "${EWM_SECRET}"
          PORT="${VPS_PORT:-22}"
          TARGET="${VPS_USER}@${VPS_HOST}"
          ssh -p "${PORT}" "${TARGET}" "mkdir -p '${DEPLOY_PATH}'"
          {
            echo "EWM_SECRET=${EWM_SECRET}"
            echo "NEXT_PUBLIC_WS_URL=wss://ewm.ciger.dev/ws"
            echo "WS_PORT=4444"
          } | ssh -p "${PORT}" "${TARGET}" "cat > '${DEPLOY_PATH}/.env'"

      - name: Sync files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          TARGET="${VPS_USER}@${VPS_HOST}"
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='data' \
            --exclude='.env' \
            --exclude='.env.local' \
            -e "ssh -p ${PORT}" \
            "${GITHUB_WORKSPACE}/" "${TARGET}:${DEPLOY_PATH}/"

      - name: Build and deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          TARGET="${VPS_USER}@${VPS_HOST}"
          ssh -p "${PORT}" "${TARGET}" "bash -s" <<'ENDSSH'
          set -euo pipefail
          docker network create websites-network 2>/dev/null || true
          cd /opt/websites/edit-with-me
          docker compose down --remove-orphans || true
          docker compose up -d --build
          docker image prune -f
          ENDSSH

      - name: Smoke check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          TARGET="${VPS_USER}@${VPS_HOST}"
          ssh -p "${PORT}" "${TARGET}" "bash -s" <<'ENDSSH'
          set -euo pipefail
          # Check both containers are running
          docker ps -q -f name=ewm-web | grep -q . || { echo "ewm-web not running"; exit 1; }
          docker ps -q -f name=ewm-ws  | grep -q . || { echo "ewm-ws not running";  exit 1; }
          # HTTP smoke check
          for i in $(seq 1 20); do
            STATUS="$(curl -fsS -o /dev/null -w "%{http_code}" "http://127.0.0.1:3007/" || true)"
            if [ "${STATUS}" -ge 200 ] 2>/dev/null && [ "${STATUS}" -lt 400 ] 2>/dev/null; then
              echo "Smoke check passed (HTTP ${STATUS})"
              exit 0
            fi
            echo "Waiting (attempt ${i}/20, status=${STATUS})"
            sleep 3
          done
          echo "Smoke check failed"
          exit 1
          ENDSSH
