services:
  ewm-web:
    image: ${IMAGE_REF_WEB:-ewm-web:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:4444}
    container_name: ewm-web
    restart: unless-stopped
    ports:
      - "3007:3000"
    environment:
      NODE_ENV: production
      EWM_SECRET: ${EWM_SECRET}
    volumes:
      - ewm-data:/app/data
    networks:
      - websites-network
    depends_on:
      - ewm-ws

  ewm-ws:
    image: ${IMAGE_REF_WS:-ewm-ws:local}
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ewm-ws
    restart: unless-stopped
    ports:
      - "3008:4444"
    environment:
      NODE_ENV: production
      EWM_SECRET: ${EWM_SECRET}
      WS_PORT: "4444"
    volumes:
      - ewm-data:/app/data
    networks:
      - websites-network

volumes:
  ewm-data:

networks:
  websites-network:
    external: true
